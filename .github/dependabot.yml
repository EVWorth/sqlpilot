version: 2
updates:
  # Supply-chain defense: minimum 7-day cooldown before Dependabot opens
  # a version-bump PR. Matches `.npmrc` `min-release-age=7` and the
  # cargo audit `min-age` policy. Security updates bypass cooldown by
  # default (Dependabot's `security-updates`-first behavior).
  # When RFC 3923 (`-Zmin-publish-age`) stabilizes on Rust stable
  # (~1.98+), the cargo ecosystem can drop to native enforcement
  # and `cooldown` can be relaxed. Tracking: see sqlpilot issue.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "rust"
    open-pull-requests-limit: 10
    groups:
      cargo:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 10
    groups:
      npm:
        patterns:
          - "*"
